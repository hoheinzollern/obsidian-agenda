name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.0"

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-release.apk \
            artifacts/obsidian-agenda-${{ github.ref_name }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: artifacts/*.apk

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.0"

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release macOS
        run: flutter build macos --release

      - name: Zip the .app bundle
        run: |
          mkdir -p artifacts
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent obsidian-agenda.app \
            "$GITHUB_WORKSPACE/artifacts/obsidian-agenda-${{ github.ref_name }}-macos.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: artifacts/*.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.0"

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release Linux
        run: flutter build linux --release

      - name: Tar the bundle
        run: |
          mkdir -p artifacts
          cp linux/install.sh build/linux/x64/release/bundle/install.sh
          chmod +x build/linux/x64/release/bundle/install.sh
          cd build/linux/x64/release/bundle
          tar -czf "$GITHUB_WORKSPACE/artifacts/obsidian-agenda-${{ github.ref_name }}-linux-x64.tar.gz" .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: artifacts/*.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.0"

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release Windows
        run: flutter build windows --release

      - name: Zip the build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive `
            -Path build\windows\x64\runner\Release\* `
            -DestinationPath "artifacts\obsidian-agenda-${{ github.ref_name }}-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: artifacts/*.zip

  release:
    needs: [build-android, build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
